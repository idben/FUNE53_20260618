<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .pokes {
            display: flex;
            gap: 10px;

            .poke {
                width: 90px;
                height: 90px;
                background-color: #ee8787;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: sans-serif;
                font-size: 20px;

                &.hide {
                    display: none;
                }
            }
        }
    </style>
    <title>陣列專屬迴圈類</title>
</head>

<body>
    <div class="pokes">
        <div class="poke">小火龍</div>
        <div class="poke">杰尼龜</div>
        <div class="poke">木木梟</div>
        <div class="poke">火球鼠</div>
        <div class="poke">水水獺</div>
        <div class="poke">新葉喵</div>
    </div>

    <script>
        const nodes = document.querySelectorAll(".poke");

        // forEach
        // 不支援終止, 不支援跳過
        nodes.forEach(function (value, index, ary) {
            // console.log(index);
            // console.log(value.innerHTML);
            // console.log(ary);
            // console.log("------我是分隔線-------");
        });

        // function 預設回傳 undefined
        // map 整理成新陣列用
        const ary1 = [...nodes].map((v, i) => {
            return `${i + 1}. ${v.innerHTML}`;
        });
        console.log(ary1);

        // filter
        // 篩選
        const ary2 = [...nodes].filter(function (node) {
            return node.textContent.includes("火")
        });
        console.log(ary2);

        // 組合用法
        [...nodes].map(node => {
            node.classList.add("hide")
            return node;
        }).filter(node => {
            // return node.textContent.includes("火");
            return node.textContent[0] == node.textContent[1];
        }).forEach(node => {
            node.classList.remove("hide");
        });


        // every / some
        const numbers = [33, 44, 9, 6, 15, 19, 27, 55];
        const result = numbers.every(age => age >= 18);
        console.log(result);
        const result2 = numbers.some(age => age >= 18);
        console.log(result2);

        numbers.sort(); // 字典排序 自然排序
        numbers.sort(function (a, b) { return a - b }); // 升冪
        numbers.sort((a, b) => b - a); // 降冪
        console.log(numbers);



    </script>
</body>

</html>
