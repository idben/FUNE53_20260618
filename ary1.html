<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陣列的操作</title>
</head>

<body>

    <script>
        Array.prototype.l = function () {
            return this.length;
        }

        // new Arry 和 [] 兩個表現方式, 只有在填入一個數字的時候, 有不同的結果
        const ary1 = new Array(3);
        const ary2 = [3];

        console.log(ary1);
        console.log(ary2);
        console.log(ary2.l());

        const ary3 = [1, 2, 3, 4, 5];
        const ary4 = [8, 9, 10]

        // 往陣列的最後塞
        ary3.push(6);
        ary3.push(7);
        ary3.push(...ary4); // ... : 攤平的意思

        // 刪除陣列的最後一個, 並回傳
        const v1 = ary3.pop();
        const v2 = ary3.pop();
        const v3 = ary3.pop();

        // 刪除陣列的第一個, 並回傳
        const v4 = ary3.shift();

        // 往陣列的最前塞
        ary3.unshift(v1)
        ary3.unshift(v2, v3, v4)

        console.log(ary3);

        // 陣列組合
        const ary5 = [1, 2, 3];
        const ary6 = [4, 5, 6];
        const ary7 = [7, 8, 9];
        console.log(ary5.concat(ary6));
        console.log(ary5.concat(ary6, ary7));
        console.log([].concat(ary5)); // 陣列複製的一種

        // 組合字串
        console.log(ary5.toString());
        console.log(ary5.join(""));
        console.log(ary5.join(", "));

        console.log(ary5.reverse());

        const pokemons = ["小火龍", "杰尼龜", "妙蛙種子", "新葉喵", "呆火鱷", "潤水鴨"];
        console.log(pokemons.slice()); // 陣列複製的一種
        console.log([...pokemons]); // 陣列複製的一種
        console.log(pokemons.slice(2));
        console.log(pokemons.slice(2, 4));
        console.log(pokemons.slice(-2));
        console.log(pokemons.slice(-4, -2));
        console.log(pokemons.slice(-2, -4)); // 取不到, 回傳空陣列

        // splice
        const pokemons2 = ["小火龍", "杰尼龜", "妙蛙種子", "新葉喵"];
        const ary8 = ["木木梟", "火球鼠", "水水獺"];
        // pokemons2.splice(); // 陣列複製的一種
        // pokemons2.splice(2);
        // pokemons2.splice(2, 1); // 常常在用的陣列刪除元素方法
        // pokemons2.splice(2, 1, "木木梟", "火球鼠", "水水獺"); // 取代
        // pokemons2.splice(2, 1, ...ary8); // 把指定陣列攤平並取代
        pokemons2.splice(2, 0, ...ary8);

        console.log(pokemons2);







    </script>
</body>

</html>
