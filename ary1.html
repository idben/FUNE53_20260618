<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陣列的操作</title>
</head>

<body>

    <script>
        Array.prototype.l = function () {
            return this.length;
        }

        // new Arry 和 [] 兩個表現方式, 只有在填入一個數字的時候, 有不同的結果
        const ary1 = new Array(3);
        const ary2 = [3];

        console.log(ary1);
        console.log(ary2);
        console.log(ary2.l());

        const ary3 = [1, 2, 3, 4, 5];
        const ary4 = [8, 9, 10]

        // 往陣列的最後塞
        ary3.push(6);
        ary3.push(7);
        ary3.push(...ary4); // ... : 攤平的意思

        // 刪除陣列的最後一個, 並回傳
        const v1 = ary3.pop();
        const v2 = ary3.pop();
        const v3 = ary3.pop();

        // 刪除陣列的第一個, 並回傳
        const v4 = ary3.shift();

        // 往陣列的最前塞
        ary3.unshift(v1)
        ary3.unshift(v2, v3, v4)

        console.log(ary3);

        // 陣列組合
        const ary5 = [1, 2, 3];
        const ary6 = [4, 5, 6];
        const ary7 = [7, 8, 9];
        console.log(ary5.concat(ary6));
        console.log(ary5.concat(ary6, ary7));
        console.log([].concat(ary5)); // 陣列複製的一種

        // 組合字串
        console.log(ary5.toString());
        console.log(ary5.join(""));
        console.log(ary5.join(", "));





    </script>
</body>

</html>
