<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物件的屬性方法事件</title>
</head>

<body>

    <script>
        const obj1 = new Object();
        const obj2 = {
            name: "皮卡丘",
            sn: "026",
            33: "123"
        }; // 官方推推 // const 定義物件陣列變數, 官方推推

        obj1.name = "皮卡丘"
        // obj1.sn = "026";
        // 物件加中括號: 轉 key
        obj1["sn"] = "026";
        obj1["33"] = "123";
        for (let i = 0; i < 3; i++) {
            obj1["type" + (i + 1)] = i;
            obj2[`type${i + 1}`] = i;
        }

        console.log(obj1);
        console.log(obj2);
        console.log(obj1 == obj2);
    </script>
</body>

</html>
